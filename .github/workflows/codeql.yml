name: CodeQL

# Multi-language CodeQL for repos with mixed stack.
# Use this for: free-steam-games-list (Python + TS + Rust),
# free-games-itchio-list (Python + TS + Rust).
#
# Matrix splits each language into a separate parallel job — failures in
# one language don't block the others.

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/**'
      - 'web/src/**'
      - 'webapp/src/**'
      - 'web/src-tauri/**'
      - 'webapp/src-tauri/**'
      - '**/*.py'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.rs'
      - 'requirements.txt'
      - 'package.json'
      - 'package-lock.json'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'scripts/**'
      - 'web/src/**'
      - 'webapp/src/**'
      - 'web/src-tauri/**'
      - 'webapp/src-tauri/**'
      - '**/*.py'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.rs'
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Note: Rust support in CodeQL is in beta as of 2026 — toggle the
        # 'rust' entry off if your CodeQL setup doesn't recognize it yet.
        language: ['python', 'javascript-typescript']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
