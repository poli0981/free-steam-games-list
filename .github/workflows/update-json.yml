name: Auto Update JSON Data
on:
  schedule:
    - cron: '0 0 * * *'   # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Full data update
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: |
          chmod +x ./bash/json.sh
          ./bash/json.sh