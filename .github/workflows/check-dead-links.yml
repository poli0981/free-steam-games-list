name: Check Dead Links
on:
  schedule:
    - cron: '0 4 1,6,11,16,21,26 * *'   # ~Every 5 days at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dead-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check dead links
        run: |
          chmod +x ./bash/dead_links.sh
          ./bash/dead_links.sh