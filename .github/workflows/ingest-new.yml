name : Ingest New Game Links
on :
  # branches filter is REQUIRED: without it every v*/desktop-v* tag push
  # matches the paths filter (tag pushes compare against an empty base),
  # fires the ingest on a detached HEAD, and dies with exit 128 on push.
  push : { branches : [ main ], paths : [ 'scripts/temp_info.jsonl' ] }
  workflow_dispatch :
permissions : { contents : write }
concurrency :
  group : data-write
  cancel-in-progress : false
jobs :
  ingest :
    runs-on : ubuntu-latest
    steps :
      -
        uses : actions/checkout@v6
        with : { token : '${{ secrets.GH_TOKEN }}' }
      -
        uses : actions/setup-python@v6
        with : { python-version : '3.14' }
      -
        run : chmod +x ./bash/ingest.sh && ./bash/ingest.sh
        env : { STEAM_API_KEY : '${{ secrets.STEAM_API_KEY }}' }
