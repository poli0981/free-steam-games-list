name : Ingest from Issue
on :
  issues : { types : [ opened ] }
permissions : { contents : write, issues : write }
jobs :
  ingest :
    if : contains(github.event.issue.title, '[add-game]')
    runs-on : ubuntu-latest
    steps :
      -
        uses : actions/checkout@v4
        with : { token : '${{ secrets.GH_TOKEN }}' }
      -
        uses : actions/setup-python@v5
        with : { python-version : '3.12' }
      -
        uses : actions/github-script@v7
        with :
          script : |
            const body = context.payload.issue.body || '';
            const m = body.match(/```json\s*([\s\S]*?)\s*```/);
            if (!m) { core.setFailed('No JSON block'); return; }
            const fs = require('fs');
            fs.writeFileSync('scripts/temp_info.jsonl', m[1].trim() + '\n');
      -
        run : |
          pip install --quiet requests jsonlines
          python scripts/ingest_new.py
          python scripts/generate_tables.py
        env : { STEAM_API_KEY : '${{ secrets.STEAM_API_KEY }}' }
      -
        run : |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --staged --quiet && echo "No changes" || git commit -m "Ingest #${{ github.event.issue.number }}" && git push
      -
        uses : actions/github-script@v7
        with :
          script : |
            const n = context.payload.issue.number;
            const fs = require('fs');
            let t = ''; try { t = fs.readFileSync('scripts/temp_info.jsonl','utf8').trim(); } catch {}
            const ok = t === '';
            await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:n,
              body: ok ? '✅ Game added!' : '❌ Ingest failed or skipped. Check logs.'});
            await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:n,
              state:'closed', labels:['add-game', ok ? 'completed' : 'rejected']});
